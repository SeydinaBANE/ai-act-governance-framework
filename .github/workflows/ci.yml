name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Backend — Lint (ruff + mypy)
  # ─────────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install ruff mypy sqlalchemy[mypy] pydantic[email] pydantic-settings

      - name: Lint (ruff)
        run: ruff check app/

      - name: Format check (ruff)
        run: ruff format --check app/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

  # ─────────────────────────────────────────
  # Backend — Tests (pytest + PostgreSQL)
  # ─────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiact
          POSTGRES_PASSWORD: aiact_dev_secret_2026
          POSTGRES_DB: aiact_governance
        options: >-
          --health-cmd "pg_isready -U aiact -d aiact_governance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://aiact:aiact_dev_secret_2026@localhost:5432/aiact_governance
      SECRET_KEY: ci-secret-key-not-used-in-prod-32chars  # pragma: allowlist secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENVIRONMENT: development
      LOG_LEVEL: WARNING
      OPENROUTER_API_KEY: sk-dummy  # pragma: allowlist secret
      OPENROUTER_MODEL: anthropic/claude-haiku-4.5
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      PRESIDIO_ANALYZER_URL: http://localhost:3000
      PRESIDIO_ANONYMIZER_URL: http://localhost:3001
      PRESIDIO_CONFIDENCE_THRESHOLD: "0.85"
      MAX_UPLOAD_SIZE_MB: "10"
      UPLOAD_DIR: /tmp/uploads
      ALLOWED_ORIGINS: '["http://localhost:3000"]'

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: aiact_dev_secret_2026  # pragma: allowlist secret
        run: |
          psql -h localhost -U aiact -d aiact_governance \
            -c "CREATE DATABASE aiact_governance_test;" || true

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          export DATABASE_URL=postgresql+asyncpg://aiact:aiact_dev_secret_2026@localhost:5432/aiact_governance_test
          pytest tests/integration/ -v --tb=short

      - name: Coverage report
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://aiact:aiact_dev_secret_2026@localhost:5432/aiact_governance_test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─────────────────────────────────────────
  # Frontend — Lint + Type check
  # ─────────────────────────────────────────
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ─────────────────────────────────────────
  # Frontend — Build
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-lint

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/
          retention-days: 7
