services:
  postgres:
    image: postgres:16-alpine
    container_name: aiact_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiact}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiact_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aiact_governance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiact} -d ${POSTGRES_DB:-aiact_governance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: aiact_presidio_analyzer
    ports:
      - "5001:3000"
    environment:
      - PRESIDIO_SUPPORTED_LANGUAGES=fr,en
    restart: unless-stopped

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: aiact_presidio_anonymizer
    ports:
      - "5002:3001"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: aiact_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiact}:${POSTGRES_PASSWORD:-aiact_dev_secret}@postgres:5432/${POSTGRES_DB:-aiact_governance}
      PRESIDIO_ANALYZER_URL: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_URL: http://presidio-anonymizer:3001
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: aiact_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:

networks:
  default:
    name: aiact_network
