[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit (security)
    "ANN", # flake8-annotations
    "PTH", # use pathlib
    "RUF", # ruff-specific
]
ignore = [
    "S101",   # assert dans les tests
    "B008",   # ne pas appeler Depends() en default arg
    "S105",   # faux positif OAuth2 : "bearer" n'est pas un mot de passe
    "F821",   # forward refs SQLAlchemy Mapped[] OK avec from __future__ import annotations
    "ANN401", # Any autorisé pour les factory de dépendances FastAPI (require_role)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "ANN"]
"app/main.py" = ["ANN"]  # middleware ASGI : typage call_next est infaisable proprement

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
strict_equality = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = ["error", "ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["app"]
omit = ["app/alembic/*", "*/migrations/*"]

[tool.coverage.report]
fail_under = 70
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
